
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Yolistli</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="estilos.css">

</head>
<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center"
           href="index.html">

            <img src="imagenes/logo.jpeg"
                 class="logo-img">

            <span class="ms-3 titulo-logo">
                YOLISTLI
            </span>

        </a>

    </div>

</nav>

<!-- ================= LOGIN ================= -->

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="login-card">

                    <div class="text-center mb-4">

                        <img src="imagenes/logo.jpeg"
                             class="login-logo">

                        <h1 class="login-title">

                            Acceso al Sistema

                        </h1>

                        <p class="login-subtitle">

                            Inicia sesión para continuar
                            tu aventura en Yolistli.

                        </p>

                    </div>

                    <!-- FORMULARIO -->

                    <form id="loginForm">

                        <!-- USUARIO -->

                        <div class="mb-3">

                            <label class="form-label">

                                Usuario

                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="usuario"
                                   placeholder="Ingresa tu usuario">

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-4">

                            <label class="form-label">

                                Contraseña

                            </label>

                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   placeholder="Ingresa tu contraseña">

                        </div>

                        <!-- BOTÓN -->

                        <div class="d-grid">

                            <button class="btn btn-success btn-lg">

                                Ingresar

                            </button>

                        </div>

                    </form>

                    <!-- CREAR CUENTA -->

                    <div class="mt-4 text-center">

                        <a href="registro.html"
                           class="btn btn-outline-light">

                            Crear cuenta

                        </a>

                    </div>

                    <!-- ADMIN DEMO -->

                    <div class="admin-info text-center mt-4">

                       

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container text-center">

        <h4>YOLISTLI</h4>

        <p>
            Proyecto desarrollado por CORNDEV
        </p>

    </div>

</footer>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= JAVASCRIPT ================= -->

<script type="module">
import { loginUser } from "../src/auth.js";
// LOGIN


const loginForm=document.getElementById("loginForm");
loginForm.addEventListener("submit", async (e)=>{
e.preventDefault();
const usuario=document.getElementById("usuario").value.trim();
const password=document.getElementById("password").value;
const ok=await loginUser(usuario,password);
if(ok){ alert("Inicio de sesión exitoso"); window.location.href="index.html";}
else{ alert("Usuario o contraseña incorrectos");}
});
</script>

</body>
</html>
