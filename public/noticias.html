
<!DOCTYPE html>

    <!-- CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="index.html">

            <img src="imagenes/logo.jpeg" class="logo-img">

            <span class="ms-3 titulo-logo">YOLISTLI</span>

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="registro.html">Registro</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="noticias.html">Noticias</a>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="noticias-hero">

    <div class="container text-center">

        <h1 class="noticias-title">
            Noticias y Actualizaciones
        </h1>

        <p class="noticias-subtitle">
            Mantente informado sobre las novedades, eventos y desarrollo de Yolistli.
        </p>

    </div>

</section>

<!-- ================= IMAGEN ================= -->

<section class="imagen-noticias-section">

    <div class="container">

        <div class="imagen-noticias-card">

            <img src="imagenes/Menu_de_carga1.png"
                 alt="Noticias Yolistli"
                 class="imagen-noticias">

        </div>

    </div>

</section>

<!-- ================= FILTROS ================= -->

<section class="filtros-section">

    <div class="container">

        <div class="filtros-container">

            <button class="btn btn-success filtro-btn"
                    onclick="filtrarNoticias('todas')">

                Todas

            </button>

            <button class="btn btn-outline-light filtro-btn"
                    onclick="filtrarNoticias('actualizacion')">

                Actualizaciones

            </button>

            <button class="btn btn-outline-light filtro-btn"
                    onclick="filtrarNoticias('evento')">

                Eventos

            </button>

            <button class="btn btn-outline-light filtro-btn"
                    onclick="filtrarNoticias('desarrollo')">

                Desarrollo

            </button>

        </div>

    </div>

</section>

<!-- ================= BUSCADOR ================= -->

<section class="buscador-noticias-section">

    <div class="container">

        <input type="text"
               id="buscadorNoticias"
               class="form-control buscador-noticias"
               placeholder="Buscar noticias...">

    </div>

</section>

<!-- ================= NOTICIAS ================= -->

<section class="noticias-section">

    <div class="container">

        <div class="row g-4"
             id="contenedorNoticias">

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container text-center">

        <h4>YOLISTLI</h4>

        <p>
            Proyecto desarrollado por CORNDEV
        </p>

    </div>

</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= JAVASCRIPT ================= -->

<script>

// ================= ARRAY DE OBJETOS =================

const noticias = [

    {

        titulo:
        "Fecha oficial de lanzamiento",

        fecha:
        "10/04/2026",

        categoria:
        "evento",

        descripcion:
        "El lanzamiento oficial de Yolistli está programado para mediados de julio. El equipo de CORNDEV continúa trabajando en optimizaciones y mejoras para ofrecer una experiencia envolvente basada en la cultura prehispánica.",

        imagen:
        "imagenes/Imagen_de_carga1.png"

    },

    {

        titulo:
        "Nuevos animales llegarán al juego",

        fecha:
        "12/04/2026",

        categoria:
        "actualizacion",

        descripcion:
        "La próxima actualización incluirá nuevas criaturas y animales interactivos dentro del entorno del juego, aumentando la exploración y el dinamismo de la experiencia.",

        imagen:
        "imagenes/Bocetos_casa.jpeg"

    },

    {

        titulo:
        "Sistema de mascotas en desarrollo",

        fecha:
        "14/04/2026",

        categoria:
        "desarrollo",

        descripcion:
        "Actualmente se trabaja en un sistema de mascotas con comportamientos únicos, permitiendo una interacción más inmersiva y cercana con el jugador.",

        imagen:
        "imagenes/bocetos_de_personaje_principal.png"

    },

    {

        titulo:
        "Mejoras gráficas y optimización",

        fecha:
        "18/04/2026",

        categoria:
        "actualizacion",

        descripcion:
        "Se implementaron nuevas mejoras visuales, efectos de iluminación y optimización general del rendimiento para ofrecer una experiencia más fluida.",

        imagen:
        "imagenes/Desarrollo_del_personaje principal.png"

    }

];

// ================= CONTENEDOR =================

const contenedor =
document.getElementById("contenedorNoticias");

const buscador =
document.getElementById("buscadorNoticias");

// ================= MOSTRAR NOTICIAS =================

function mostrarNoticias(listaNoticias){

    contenedor.innerHTML = "";

    listaNoticias.forEach((noticia)=>{

        contenedor.innerHTML += `

        <div class="col-lg-6">

            <div class="noticia-card">

                <img src="${noticia.imagen}"
                     class="noticia-img">

                <div class="noticia-content">

                    <div class="noticia-top">

                        <span class="categoria-badge">
                            ${noticia.categoria}
                        </span>

                        <span class="fecha-noticia">
                            ${noticia.fecha}
                        </span>

                    </div>

                    <h3>
                        ${noticia.titulo}
                    </h3>

                    <p>
                        ${noticia.descripcion}
                    </p>

                    <button class="btn btn-success">

                        Leer más

                    </button>

                </div>

            </div>

        </div>

        `;

    });

}

// ================= FILTROS =================

function filtrarNoticias(categoria){

    if(categoria === "todas"){

        mostrarNoticias(noticias);

    }else{

        const filtradas = noticias.filter(noticia =>

            noticia.categoria === categoria

        );

        mostrarNoticias(filtradas);

    }

}

// ================= BUSCADOR =================

buscador.addEventListener("input", ()=>{

    const texto =
    buscador.value.toLowerCase();

    const resultados =
    noticias.filter(noticia =>

        noticia.titulo.toLowerCase().includes(texto)
        ||
        noticia.descripcion.toLowerCase().includes(texto)

    );

    mostrarNoticias(resultados);

});

// ================= INICIO =================

mostrarNoticias(noticias);

</script>

</body>
</html>
