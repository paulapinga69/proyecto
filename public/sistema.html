<body>

<!-- ================= HERO ================= -->

<section class="sistema-section">

    <div class="container">

        <div class="text-center mb-5">

            <h1 class="sistema-title">
                Panel Administrativo
            </h1>

            <p class="sistema-subtitle">
                Administración de registros del sistema Yolistli.
            </p>

        </div>

        <div class="row g-5">

            <!-- ================= FORM ================= -->

            <div class="col-lg-4">

                <div class="sistema-card">

                    <h3 class="mb-4">
                        Registrar usuario
                    </h3>

                    <form id="sistemaForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Nombre
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="nombreSistema">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Edad
                            </label>

                            <input type="number"
                                   class="form-control"
                                   id="edadSistema">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Ciudad
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="ciudadSistema">

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-success">

                                Guardar registro

                            </button>

                        </div>

                    </form>

                </div>

            </div>

            <!-- ================= TABLA ================= -->

            <div class="col-lg-8">

                <div class="sistema-card">

                    <div class="tabla-header">

                        <h3>
                            Registros almacenados
                        </h3>

                        <input type="text"
                               class="form-control buscador"
                               id="buscarSistema"
                               placeholder="Buscar registro">

                    </div>

                    <div class="table-responsive">

                        <table class="table table-dark table-hover">

                            <thead>

                                <tr>

                                    <th>Nombre</th>
                                    <th>Edad</th>
                                    <th>Ciudad</th>
                                    <th>Acciones</th>

                                </tr>

                            </thead>

                            <tbody id="tablaSistema">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container text-center">

        <h4>YOLISTLI</h4>

        <p>
            Proyecto desarrollado por CORNDEV
        </p>

    </div>

</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= JAVASCRIPT ================= -->

<script>

let registros =
JSON.parse(localStorage.getItem("registros"))
|| [];

// ELEMENTOS

const sistemaForm =
document.getElementById("sistemaForm");

const tablaSistema =
document.getElementById("tablaSistema");

const buscarSistema =
document.getElementById("buscarSistema");

// ================= FORMULARIO =================

sistemaForm.addEventListener("submit", (e)=>{

    e.preventDefault();

    const nombre =
    document.getElementById("nombreSistema").value;

    const edad =
    document.getElementById("edadSistema").value;

    const ciudad =
    document.getElementById("ciudadSistema").value;

    if(
        nombre === ""
        ||
        edad === ""
        ||
        ciudad === ""
    ){

        alert("Completa todos los campos");

        return;

    }

    // OBJETO

    const usuario = {

        nombre,
        edad,
        ciudad

    };

    // PUSH

    registros.push(usuario);

    // GUARDAR

    localStorage.setItem(
        "registros",
        JSON.stringify(registros)
    );

    // ACTUALIZAR

    mostrarRegistros();

    // RESET

    sistemaForm.reset();

});

// ================= MOSTRAR =================

function mostrarRegistros(){

    tablaSistema.innerHTML = "";

    registros.forEach((registro, index)=>{

        tablaSistema.innerHTML += `

        <tr>

            <td>${registro.nombre}</td>

            <td>${registro.edad}</td>

            <td>${registro.ciudad}</td>

            <td>

                <button class="btn btn-danger btn-sm"
                        onclick="eliminarRegistro(${index})">

                    Eliminar

                </button>

            </td>

        </tr>

        `;

    });

}

// ================= ELIMINAR =================

function eliminarRegistro(index){

    registros.splice(index,1);

    localStorage.setItem(
        "registros",
        JSON.stringify(registros)
    );

    mostrarRegistros();

}

// ================= BUSCADOR =================

buscarSistema.addEventListener("input", ()=>{

    const texto =
    buscarSistema.value.toLowerCase();

    const filas =
    tablaSistema.querySelectorAll("tr");

    filas.forEach(fila => {

        const contenido =
        fila.textContent.toLowerCase();

        fila.style.display =
        contenido.includes(texto)
        ? ""
        : "none";

    });

});

// ================= INICIO =================

mostrarRegistros();

</script>

</body>
</html>
