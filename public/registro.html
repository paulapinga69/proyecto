<!-- ================= REGISTRO ================= -->

<section class="registro-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="registro-card">

                    <div class="text-center mb-4">

                        <img src="imagenes/logo.jpeg"
                             class="login-logo">

                        <h1 class="registro-title">

                            Crear Cuenta

                        </h1>

                        <p class="registro-subtitle">

                            Regístrate para comenzar
                            tu aventura en Yolistli.

                        </p>

                    </div>

                    <!-- FORMULARIO -->

                    <form id="registroForm">

                        <!-- USUARIO -->

                        <div class="mb-3">

                            <label class="form-label">

                                Usuario

                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="usuario"
                                   placeholder="Nombre de usuario">

                            <small id="mensajeUsuario"></small>

                        </div>

                        <!-- EDAD -->

                        <div class="mb-3">

                            <label class="form-label">

                                Edad

                            </label>

                            <input type="number"
                                   class="form-control"
                                   id="edad"
                                   placeholder="Ingresa tu edad">

                            <small id="mensajeEdad"></small>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">

                                Contraseña

                            </label>

                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   placeholder="Mínimo 6 caracteres">

                            <small id="mensajePassword"></small>

                        </div>

                        <!-- OPINIÓN -->

                        <div class="mb-4">

                            <label class="form-label">

                                Opinión sobre Yolistli

                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      id="opinion"
                                      placeholder="Escribe tu opinión..."></textarea>

                        </div>

                        <!-- BOTÓN -->

                        <div class="d-grid">

                            <button class="btn btn-success btn-lg">

                                Registrarse

                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <a href="login.html"
                           class="btn btn-outline-light">

                            Ya tengo cuenta

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= JAVASCRIPT ================= -->

<script type="module">
import { registerUser } from "../src/auth.js";
const usuario=document.getElementById("usuario");
const edad=document.getElementById("edad");
const password=document.getElementById("password");
const opinion=document.getElementById("opinion");

function sanitizar(v){ return v.replace(/[^a-zA-Z0-9@._ -]/g,''); }

document.getElementById("registroForm").addEventListener("submit", async (e)=>{
e.preventDefault();
if(usuario.value.length<4 || edad.value<12 || password.value.length<6){ alert("Datos inválidos"); return; }
try{
 await registerUser(sanitizar(usuario.value),password.value);
 alert("Registro exitoso");
 location.href="login.html";
}catch(err){ alert(err.message); }
});
</script>

</body>
