
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Panel Administrativo</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="estilos.css">

</head>
<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center">

            <img src="imagenes/logo.jpeg"
                 class="logo-img">

            <span class="ms-3 titulo-logo">

                PANEL ADMIN

            </span>

        </a>

        <button class="btn btn-danger"
                onclick="cerrarSesion()">

            Cerrar sesión

        </button>

    </div>

</nav>

<!-- ================= PANEL ================= -->

<section class="sistema-section">

    <div class="container">

        <!-- TÍTULO -->

        <div class="text-center mb-5">

            <h1 class="sistema-title">

                Panel Administrativo CORNDEV

            </h1>

            <p class="sistema-subtitle">

                Administración de usuarios
                y control del sistema Yolistli.

            </p>

        </div>

        <!-- CREAR ADMIN -->

        <div class="registro-card mb-5">

            <h3 class="mb-4">

                Crear nuevo usuario/admin

            </h3>

            <form id="adminForm">

                <div class="row g-3">

                    <div class="col-md-4">

                        <input type="text"
                               class="form-control"
                               id="nuevoUsuario"
                               placeholder="Usuario">

                    </div>

                    <div class="col-md-3">

                        <input type="password"
                               class="form-control"
                               id="nuevoPassword"
                               placeholder="Contraseña">

                    </div>

                    <div class="col-md-2">

                        <input type="number"
                               class="form-control"
                               id="nuevaEdad"
                               placeholder="Edad">

                    </div>

                    <div class="col-md-3">

                        <select class="form-select"
                                id="nuevoRol">

                            <option value="usuario">

                                Usuario

                            </option>

                            <option value="admin">

                                Admin

                            </option>

                        </select>

                    </div>

                </div>

                <div class="d-grid mt-4">

                    <button class="btn btn-success">

                        Crear usuario

                    </button>

                </div>

            </form>

        </div>

        <!-- BOTONES -->

        <div class="panel-botones mb-5">

            <button class="btn btn-success"
                    onclick="descargarUsuarios()">

                Descargar usuarios JSON

            </button>

            <button class="btn btn-outline-light"
                    onclick="eliminarTodo()">

                Eliminar todos los registros

            </button>

        </div>

        <!-- ESTADÍSTICAS -->

        <div class="row g-4 mb-5">

            <div class="col-md-4">

                <div class="estadistica-card">

                    <h2 id="totalUsuarios">0</h2>

                    <p>Total usuarios</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="estadistica-card">

                    <h2 id="usuariosAdmin">0</h2>

                    <p>Administradores</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="estadistica-card">

                    <h2 id="usuariosNormales">0</h2>

                    <p>Usuarios normales</p>

                </div>

            </div>

        </div>

        <!-- TABLA -->

        <div class="tabla-card">

            <div class="tabla-header">

                <h3>

                    Usuarios registrados

                </h3>

                <input type="text"
                       class="form-control buscador"
                       id="buscador"
                       placeholder="Buscar usuario">

            </div>

            <div class="table-responsive">

                <table class="table table-dark table-hover">

                    <thead>

                        <tr>

                            <th>Usuario</th>
                            <th>Edad</th>
                            <th>Rol</th>
                            <th>Opinión</th>
                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="tablaUsuarios">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container text-center">

        <h4>YOLISTLI</h4>

    </div>

</footer>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= JAVASCRIPT ================= -->

<script>

// ================= USUARIO ACTIVO =================

const usuarioActivo =
JSON.parse(localStorage.getItem("usuarioActivo"));

// ================= VALIDACIÓN =================

if(
    !usuarioActivo
    ||
    usuarioActivo.rol !== "admin"
){

    window.location.href =
    "login.html";

}

// ================= USUARIOS =================

let usuarios =
JSON.parse(localStorage.getItem("usuarios"))
|| [];

const tabla =
document.getElementById("tablaUsuarios");

// ================= MOSTRAR =================

function mostrarUsuarios(){

    tabla.innerHTML = "";

    usuarios.forEach((usuario,index)=>{

        tabla.innerHTML += `

        <tr>

            <td>${usuario.usuario}</td>

            <td>${usuario.edad}</td>

            <td>${usuario.rol}</td>

            <td>${usuario.opinion}</td>

            <td>

                <button class="btn btn-danger btn-sm"
                        onclick="eliminarUsuario(${index})">

                    Eliminar

                </button>

            </td>

        </tr>

        `;

    });

    actualizarStats();

}

// ================= CREAR NUEVO USUARIO =================

document.getElementById("adminForm")
.addEventListener("submit", (e)=>{

    e.preventDefault();

    const usuario =
    document.getElementById("nuevoUsuario").value;

    const password =
    document.getElementById("nuevoPassword").value;

    const edad =
    document.getElementById("nuevaEdad").value;

    const rol =
    document.getElementById("nuevoRol").value;

    // VALIDACIONES

    if(
        usuario === ""
        ||
        password === ""
        ||
        edad === ""
    ){

        alert(
        "Completa todos los campos"
        );

        return;

    }

    if(password.length < 6){

        alert(
        "La contraseña debe tener mínimo 6 caracteres"
        );

        return;

    }

    // DUPLICADO

    const existe =
    usuarios.find(user =>

        user.usuario === usuario

    );

    if(existe){

        alert(
        "Ese usuario ya existe"
        );

        return;

    }

    // NUEVO OBJETO

    const nuevoUsuario = {

        usuario,
        password,
        edad,
        rol,
        opinion:"Creado desde panel"

    };

    usuarios.push(nuevoUsuario);

    localStorage.setItem(
        "usuarios",
        JSON.stringify(usuarios)
    );

    mostrarUsuarios();

    document.getElementById("adminForm")
    .reset();

    alert(
    "Usuario creado correctamente"
    );

});

// ================= ELIMINAR =================

function eliminarUsuario(index){

    usuarios.splice(index,1);

    localStorage.setItem(
        "usuarios",
        JSON.stringify(usuarios)
    );

    mostrarUsuarios();

}

// ================= DESCARGAR =================

function descargarUsuarios(){

    let datos =
    JSON.stringify(usuarios, null, 2);

    let blob =
    new Blob([datos],
    {type:"application/json"});

    let enlace =
    document.createElement("a");

    enlace.href =
    URL.createObjectURL(blob);

    enlace.download =
    "usuarios_yolistli.json";

    enlace.click();

}

// ================= ELIMINAR TODO =================

function eliminarTodo(){

    if(confirm(
        "¿Eliminar todos los registros?"
    )){

        localStorage.removeItem("usuarios");

        usuarios = [];

        mostrarUsuarios();

    }

}

// ================= ESTADÍSTICAS =================

function actualizarStats(){

    document.getElementById("totalUsuarios")
    .innerHTML = usuarios.length;

    const admins =
    usuarios.filter(u => u.rol === "admin");

    document.getElementById("usuariosAdmin")
    .innerHTML = admins.length;

    document.getElementById("usuariosNormales")
    .innerHTML =
    usuarios.length - admins.length;

}

// ================= BUSCADOR =================

document.getElementById("buscador")
.addEventListener("input", ()=>{

    const texto =
    document.getElementById("buscador")
    .value.toLowerCase();

    const filas =
    tabla.querySelectorAll("tr");

    filas.forEach(fila => {

        const contenido =
        fila.textContent.toLowerCase();

        fila.style.display =
        contenido.includes(texto)
        ? ""
        : "none";

    });

});

// ================= CERRAR SESIÓN =================

function cerrarSesion(){

    localStorage.removeItem("usuarioActivo");

    window.location.href =
    "login.html";

}

// ================= INICIO =================

mostrarUsuarios();

</script>

</body>
</html>
